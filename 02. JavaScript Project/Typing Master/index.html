<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media-queries.css">
    <title>BoltzTyping</title>
</head>
<body>
    <div class="box">
        <div class="navbar">
            <div class="logo">
                <span class="logo-icon">⌨</span>
                <span class="logo-text">BoltzTyping</span>
            </div>
        </div>
        <div class="wrapper">
            <input type="text" class="input-field" 
            autocomplete="off" 
            autocorrect="off" 
            autocapitalize="off" 
            spellcheck="false">
            
            <div class="content-box">
                <div class="typing-text">
                    <p>
                    </p>
                </div>
                <div class="content">
    <ul class="result-details">
        <li class="time">
            <p>Time Left:</p>
            <span><b>60</b>s</span>
        </li>
        <li class="mistake">
            <p>Mistakes:</p>
            <span>0</span>
        </li>
        <li class="wpm">
            <p>WPM:</p>
            <span>0</span>
        </li>
        <li class="cpm">
            <p>CPM:</p>
            <span>0</span>
        </li>
    </ul>
</div>
<div class="btn-container">
    <button class="btn1">Try Again</button>
</div>
            </div>
        </div>
    </div>
</div>
    
    
    <script src="js/paragraph.js"></script>
    <script src="js/script.js"></script>
    
</body>
</html>
